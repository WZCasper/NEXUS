<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS LINK | Custom Alias</title>
    <style>
        :root {
            --bg-color: #08080c;
            --panel-bg: rgba(15, 15, 25, 0.9);
            --accent-cyan: #00f3ff;
            --accent-purple: #bc13fe;
            --text-main: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-image: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #08080c 100%);
        }

        .scene { perspective: 1000px; width: 90%; max-width: 420px; }

        .panel {
            background: var(--panel-bg);
            border: 2px solid rgba(0, 243, 255, 0.3);
            border-radius: 20px;
            padding: 35px;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            transform-style: preserve-3d;
            transition: transform 0.1s;
        }

        h1 {
            font-size: 26px;
            text-align: center;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            margin-bottom: 25px;
        }

        .input-box { margin-bottom: 20px; }
        
        label {
            display: block;
            font-size: 10px;
            color: var(--accent-cyan);
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--accent-cyan); box-shadow: 0 0 10px rgba(0, 243, 255, 0.2); }

        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--accent-cyan), #0081cc);
            border: none;
            border-radius: 10px;
            color: #000;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 5px 0 #005a8f;
            transition: 0.1s;
        }

        .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #005a8f; }

        #loader { display: none; margin: 15px auto; width: 30px; height: 30px; border: 3px solid #333; border-top-color: var(--accent-cyan); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .result-area {
            display: none;
            margin-top: 25px;
            padding: 15px;
            background: rgba(0, 243, 255, 0.1);
            border: 1px dashed var(--accent-cyan);
            border-radius: 10px;
            text-align: center;
        }

        .error { color: #ff4d4d; font-size: 13px; margin-top: 15px; text-align: center; display: none; }
    </style>
</head>
<body>

<div class="scene">
    <div class="panel" id="panel">
        <h1>NEXUS LINK</h1>

        <div class="input-box">
            <label>Куда должна вести ссылка?</label>
            <input type="url" id="longUrl" placeholder="https://youtube.com/..." required>
        </div>

        <div class="input-box">
            <label>Ваше имя (например: my-video)</label>
            <input type="text" id="alias" placeholder="Только буквы и цифры">
        </div>

        <button class="btn" onclick="shorten()">СОКРАТИТЬ</button>
        
        <div id="loader"></div>
        <div class="error" id="error"></div>

        <div class="result-area" id="resultArea">
            <div style="font-size: 11px; margin-bottom: 8px; color: var(--accent-cyan);">ВАША ССЫЛКА ГОТОВА:</div>
            <a href="#" id="finalLink" target="_blank" style="color: #fff; font-weight: bold; font-size: 18px; text-decoration: none;"></a>
            <br><br>
            <button onclick="copy()" style="background: var(--accent-purple); color: white; border: none; padding: 7px 15px; border-radius: 5px; cursor: pointer; font-size: 12px;">Копировать</button>
        </div>
    </div>
</div>

<script>
    // Звуковой движок
    const a = new (window.AudioContext || window.webkitAudioContext)();
    function play(f, d) {
        const o = a.createOscillator(), g = a.createGain();
        o.frequency.value = f; g.gain.value = 0.1;
        o.connect(g); g.connect(a.destination);
        o.start(); g.gain.exponentialRampToValueAtTime(0.0001, a.currentTime + d);
        o.stop(a.currentTime + d);
    }

    // 3D Наклон
    document.addEventListener('mousemove', (e) => {
        const p = document.getElementById('panel');
        const x = (window.innerWidth / 2 - e.pageX) / 30;
        const y = (window.innerHeight / 2 - e.pageY) / 30;
        p.style.transform = `rotateY(${-x}deg) rotateX(${y}deg)`;
    });

    async function shorten() {
        const url = document.getElementById('longUrl').value;
        const alias = document.getElementById('alias').value.trim();
        const resDiv = document.getElementById('resultArea');
        const errDiv = document.getElementById('error');
        const loader = document.getElementById('loader');

        if (!url) return;
        play(400, 0.1);

        resDiv.style.display = 'none';
        errDiv.style.display = 'none';
        loader.style.display = 'block';

        // Формируем запрос к is.gd через стабильный прокси corsproxy.io
        let target = `https://is.gd/create.php?format=json&url=${encodeURIComponent(url)}`;
        if (alias) target += `&shorturl=${encodeURIComponent(alias)}`;
        
        const finalUrl = `https://corsproxy.io/?${encodeURIComponent(target)}`;

        try {
            const response = await fetch(finalUrl);
            const data = await response.json();

            if (data.shorturl) {
                play(800, 0.2);
                document.getElementById('finalLink').textContent = data.shorturl;
                document.getElementById('finalLink').href = data.shorturl;
                resDiv.style.display = 'block';
            } else {
                throw new Error(data.errormessage || "Это имя уже занято или недопустимо");
            }
        } catch (e) {
            play(200, 0.3);
            errDiv.textContent = "Ошибка: " + e.message;
            errDiv.style.display = 'block';
        } finally {
            loader.style.display = 'none';
        }
    }

    function copy() {
        const t = document.getElementById('finalLink').textContent;
        navigator.clipboard.writeText(t);
        play(1200, 0.1);
        alert("Скопировано!");
    }
</script>
</body>
</html>
