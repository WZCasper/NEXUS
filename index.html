<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="google-site-verification" content="08786ed5dd075446" />
    <meta name="yandex-verification" content="b0cdcd362335b6e1" />
    
    <title>NEXUS LINK | Бесплатное сокращение ссылок</title>
    
    <style>
        :root {
            --bg-color: #08080c;
            --panel-bg: rgba(15, 15, 25, 0.9);
            --accent-cyan: #00f3ff;
            --accent-purple: #bc13fe;
            --text-main: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-image: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #08080c 100%);
        }

        .scene { perspective: 1000px; width: 90%; max-width: 420px; }

        .panel {
            background: var(--panel-bg);
            border: 2px solid rgba(0, 243, 255, 0.3);
            border-radius: 20px;
            padding: 35px;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            transform-style: preserve-3d;
            transition: transform 0.1s;
            position: relative;
        }

        .visitor-stats {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--accent-cyan);
            font-size: 11px;
            font-weight: bold;
            opacity: 0.8;
            background: rgba(0, 243, 255, 0.1);
            padding: 5px 10px;
            border-radius: 20px;
            border: 1px solid rgba(0, 243, 255, 0.2);
        }
        .visitor-stats svg { width: 14px; height: 14px; stroke: var(--accent-cyan); fill: none; }

        h1 {
            font-size: 26px;
            text-align: center;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            margin-bottom: 25px;
        }

        .input-box { margin-bottom: 20px; }
        label { display: block; font-size: 10px; color: var(--accent-cyan); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        input { width: 100%; padding: 12px; background: rgba(0, 0, 0, 0.7); border: 1px solid #333; border-radius: 8px; color: #fff; outline: none; }
        input:focus { border-color: var(--accent-cyan); }

        .btn {
            width: 100%; padding: 16px; background: linear-gradient(135deg, var(--accent-cyan), #0081cc);
            border: none; border-radius: 10px; color: #000; font-weight: 900; cursor: pointer;
            text-transform: uppercase; box-shadow: 0 5px 0 #005a8f; transition: 0.1s;
        }
        .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #005a8f; }

        #loader { display: none; margin: 15px auto; width: 30px; height: 30px; border: 3px solid #333; border-top-color: var(--accent-cyan); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .result-area { display: none; margin-top: 25px; padding: 15px; background: rgba(0, 243, 255, 0.1); border: 1px dashed var(--accent-cyan); border-radius: 10px; text-align: center; }
        .error { color: #ff4d4d; font-size: 13px; margin-top: 15px; text-align: center; display: none; }
    </style>
</head>
<body>

<div class="scene">
    <div class="panel" id="panel">
        <div class="visitor-stats">
            <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
            </svg>
            <span id="visitCount">...</span>
        </div>

        <h1>NEXUS LINK</h1>

        <div class="input-box">
            <label>Ссылка для сокращения</label>
            <input type="url" id="longUrl" placeholder="https://..." required>
        </div>

        <div class="input-box">
            <label>Ваш Alias (необязательно)</label>
            <input type="text" id="alias" placeholder="Например: mylink">
        </div>

        <button class="btn sound-btn" onclick="shorten()">СОКРАТИТЬ</button>
        
        <div id="loader"></div>
        <div class="error" id="error"></div>

        <div class="result-area" id="resultArea">
            <a href="#" id="finalLink" target="_blank" style="color: #fff; font-weight: bold; font-size: 18px; text-decoration: none;"></a>
            <br><br>
            <button class="sound-btn" onclick="copy()" style="background: var(--accent-purple); color: white; border: none; padding: 7px 15px; border-radius: 5px; cursor: pointer;">Копировать</button>
        </div>
    </div>
</div>

<script>
    // --- ВОЗВРАТ ЗВУКОВОЙ СИСТЕМЫ ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playSound(freq, type, dur, vol) {
        if (audioCtx.state === 'suspended') return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + dur);
    }

    // ативация звука при любом клике на документ
    window.addEventListener('click', () => {
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }, { once: true });

    document.querySelectorAll('.sound-btn, .btn').forEach(btn => {
        btn.addEventListener('mouseenter', () => playSound(400, 'sine', 0.1, 0.05));
        btn.addEventListener('click', () => playSound(200, 'square', 0.2, 0.1));
    });

    // --- 3D И СЧЕТЧИК ---
    document.querySelectorAll('.panel').forEach(card => {
        card.addEventListener('mousemove', (e) => {
            const rect = card.getBoundingClientRect();
            card.style.transform = `rotateY(${(e.clientX - rect.left - rect.width/2)/15}deg) rotateX(${-(e.clientY - rect.top - rect.height/2)/15}deg) translateZ(10px)`;
        });
        card.addEventListener('mouseleave', () => card.style.transform = 'rotateY(0deg) rotateX(0deg)');
    });

    async function updateVisitorCount() {
        try {
            const response = await fetch('https://api.counterapi.dev/v1/nexus_link_v1/visits/up');
            const data = await response.json();
            document.getElementById('visitCount').textContent = data.count;
        } catch (e) { document.getElementById('visitCount').textContent = "152"; }
    }
    updateVisitorCount();

    // --- ЛОГИКА СОКРАЩЕНИЯ ---
    async function shorten() {
        const url = document.getElementById('longUrl').value;
        const alias = document.getElementById('alias').value.trim();
        const loader = document.getElementById('loader');
        if (!url) return;
        loader.style.display = 'block';
        
        let target = `https://is.gd/create.php?format=json&url=${encodeURIComponent(url)}`;
        if (alias) target += `&shorturl=${encodeURIComponent(alias)}`;
        
        try {
            const response = await fetch(`https://corsproxy.io/?${encodeURIComponent(target)}`);
            const data = await response.json();
            if (data.shorturl) {
                document.getElementById('finalLink').textContent = data.shorturl;
                document.getElementById('finalLink').href = data.shorturl;
                document.getElementById('resultArea').style.display = 'block';
            }
        } catch (e) { alert("Ошибка сервиса"); }
        loader.style.display = 'none';
    }

    function copy() {
        navigator.clipboard.writeText(document.getElementById('finalLink').textContent);
        alert("Скопировано!");
    }
</script>

</body>
</html>
