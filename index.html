<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS LINK | Stable Version</title>
    <style>
        :root {
            --bg-color: #08080c;
            --panel-bg: rgba(20, 20, 30, 0.95);
            --accent-cyan: #00f3ff;
            --text-main: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #08080c 100%);
        }

        .panel {
            background: var(--panel-bg);
            border: 1px solid var(--accent-cyan);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.2);
            transition: transform 0.1s ease;
        }

        h1 {
            font-size: 24px;
            letter-spacing: 2px;
            margin-bottom: 25px;
            color: var(--accent-cyan);
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 12px;
            background: #000;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            margin-bottom: 20px;
            outline: none;
        }

        input:focus { border-color: var(--accent-cyan); }

        .btn {
            width: 100%;
            padding: 15px;
            background: var(--accent-cyan);
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.2s;
        }

        .btn:hover { filter: brightness(1.2); transform: scale(1.02); }

        .result {
            display: none;
            margin-top: 20px;
            padding: 15px;
            background: rgba(0, 243, 255, 0.1);
            border-radius: 8px;
        }

        #error { color: #ff4d4d; margin-top: 15px; display: none; }
    </style>
</head>
<body>

<div class="panel" id="panel">
    <h1>NEXUS LINK</h1>
    <input type="url" id="urlInput" placeholder="Вставьте вашу ссылку...">
    <button class="btn" onclick="shorten()">Сократить</button>
    
    <div id="error">Ошибка. Попробуйте еще раз.</div>

    <div class="result" id="result">
        <div style="font-size: 12px; margin-bottom: 10px;">ГОТОВО:</div>
        <a href="#" id="shortLink" target="_blank" style="color: var(--accent-cyan); font-weight: bold;"></a>
    </div>
</div>

<script>
    // 3D эффект наклона
    const panel = document.getElementById('panel');
    document.addEventListener('mousemove', (e) => {
        const x = (window.innerWidth / 2 - e.pageX) / 25;
        const y = (window.innerHeight / 2 - e.pageY) / 25;
        panel.style.transform = `rotateY(${-x}deg) rotateX(${y}deg)`;
    });

    // Функция сокращения
    async function shorten() {
        const input = document.getElementById('urlInput').value;
        const resDiv = document.getElementById('result');
        const errDiv = document.getElementById('error');
        const linkA = document.getElementById('shortLink');

        if (!input) return;

        resDiv.style.display = 'none';
        errDiv.style.display = 'none';

        try {
            // Прямой запрос к TinyURL (без прокси, работает везде)
            const response = await fetch(`https://tinyurl.com/api-create.php?url=${encodeURIComponent(input)}`);
            
            if (response.ok) {
                const shortUrl = await response.text();
                linkA.textContent = shortUrl;
                linkA.href = shortUrl;
                resDiv.style.display = 'block';
            } else {
                errDiv.style.display = 'block';
            }
        } catch (e) {
            errDiv.style.display = 'block';
        }
    }
</script>
</body>
</html>
