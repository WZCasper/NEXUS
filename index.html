<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS LINK | 3D URL Shortener</title>
    <style>
        :root {
            --bg-color: #08080c;
            --panel-bg: rgba(20, 20, 30, 0.9);
            --accent-cyan: #00f3ff;
            --accent-purple: #bc13fe;
            --text-main: #ffffff;
            --text-muted: #6b7280;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(188, 19, 254, 0.1), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(0, 243, 255, 0.1), transparent 25%);
        }

        /* 3D Сцена */
        .scene {
            perspective: 1200px;
            width: 90%;
            max-width: 450px;
        }

        .panel {
            background: var(--panel-bg);
            border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 24px;
            padding: 40px;
            backdrop-filter: blur(15px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
        }

        .header h1 {
            font-size: 28px;
            text-align: center;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 10px;
            transform: translateZ(40px);
        }

        .input-group {
            margin: 20px 0;
            transform: translateZ(30px);
        }

        label {
            display: block;
            font-size: 11px;
            color: var(--accent-cyan);
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 14px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
        }

        .btn-3d {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #00f3ff, #0081cc);
            border: none;
            border-radius: 12px;
            color: #000;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 6px 0 #005a8f;
            transform: translateZ(50px);
            transition: 0.1s;
        }

        .btn-3d:active {
            transform: translateZ(50px) translateY(4px);
            box-shadow: 0 2px 0 #005a8f;
        }

        .result-box {
            display: none;
            margin-top: 25px;
            padding: 15px;
            background: rgba(0, 243, 255, 0.05);
            border: 1px dashed var(--accent-cyan);
            border-radius: 12px;
            text-align: center;
            transform: translateZ(20px);
        }

        .error-msg {
            display: none;
            color: #ff4d4d;
            font-size: 13px;
            margin-top: 15px;
            text-align: center;
        }

        /* Анимация загрузки */
        .loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--accent-cyan);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 10px auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="scene">
    <div class="panel" id="mainPanel">
        <div class="header">
            <h1>NEXUS LINK</h1>
        </div>

        <div class="input-group">
            <label>Ссылка для сокращения</label>
            <input type="url" id="longUrl" placeholder="https://example.com" required>
        </div>

        <div class="input-group">
            <label>Ваше имя ссылки (alias)</label>
            <input type="text" id="customAlias" placeholder="my-link-name">
        </div>

        <button class="btn-3d" onclick="shortenUrl()" id="btnText">СОКРАТИТЬ</button>
        <div class="loader" id="loader"></div>
        <div class="error-msg" id="errorMsg"></div>

        <div class="result-box" id="resultBox">
            <a href="#" target="_blank" id="shortLink" style="color: var(--accent-cyan); text-decoration: none; font-weight: bold; font-size: 18px;"></a>
            <br><br>
            <button onclick="copyLink()" style="background: var(--accent-purple); color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer;">Копировать</button>
        </div>
    </div>
</div>

<script>
    // --- ЗВУКИ ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSnd(f, t, d, v) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
        g.gain.setValueAtTime(v, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(); o.stop(audioCtx.currentTime + d);
    }

    // --- 3D ЭФФЕКТ ---
    const panel = document.getElementById('mainPanel');
    document.addEventListener('mousemove', (e) => {
        const x = (window.innerWidth / 2 - e.pageX) / 20;
        const y = (window.innerHeight / 2 - e.pageY) / 20;
        panel.style.transform = `rotateY(${-x}deg) rotateX(${y}deg)`;
    });

    // --- ЛОГИКА ---
    async function shortenUrl() {
        const url = document.getElementById('longUrl').value;
        const alias = document.getElementById('customAlias').value;
        const btn = document.getElementById('btnText');
        const loader = document.getElementById('loader');
        const error = document.getElementById('errorMsg');
        const result = document.getElementById('resultBox');

        if(!url) return;

        // Сброс состояния
        error.style.display = 'none';
        result.style.display = 'none';
        btn.style.display = 'none';
        loader.style.display = 'block';
        playSnd(440, 'sine', 0.1, 0.1);

        // Используем прокси AllOrigins для обхода CORS
        const target = `https://is.gd/create.php?format=json&url=${encodeURIComponent(url)}${alias ? '&shorturl='+encodeURIComponent(alias) : ''}`;
        const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(target)}`;

        try {
            const response = await fetch(proxyUrl);
            const data = await response.json();
            const res = JSON.parse(data.contents); // Прокси возвращает JSON строкой в поле contents

            if (res.shorturl) {
                document.getElementById('shortLink').textContent = res.shorturl;
                document.getElementById('shortLink').href = res.shorturl;
                result.style.display = 'block';
                playSnd(880, 'sine', 0.2, 0.1);
            } else {
                error.textContent = res.errormessage || "Ошибка. Возможно имя уже занято.";
                error.style.display = 'block';
                playSnd(200, 'sawtooth', 0.3, 0.1);
            }
        } catch (e) {
            error.textContent = "Ошибка сети. Попробуйте еще раз.";
            error.style.display = 'block';
        } finally {
            loader.style.display = 'none';
            btn.style.display = 'block';
        }
    }

    function copyLink() {
        const link = document.getElementById('shortLink').textContent;
        navigator.clipboard.writeText(link);
        playSnd(1200, 'sine', 0.1, 0.1);
        alert("Ссылка скопирована!");
    }
</script>
</body>
</html>
