<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS LINK | 3D URL Shortener</title>
    <style>
        :root {
            --bg-color: #08080c;
            --panel-bg: rgba(20, 20, 30, 0.8);
            --accent-cyan: #00f3ff;
            --accent-purple: #bc13fe;
            --text-main: #ffffff;
            --text-muted: #6b7280;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(188, 19, 254, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(0, 243, 255, 0.15), transparent 25%);
        }

        /* Фоновая сетка */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
            transform: perspective(500px) rotateX(60deg) translateY(-100px) translateZ(-200px);
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0) translateZ(-200px); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(40px) translateZ(-200px); }
        }

        /* 3D Контейнер */
        .scene {
            perspective: 1200px;
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        .panel {
            background: var(--panel-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,255,255,0.05);
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            transform: translateZ(40px);
        }

        .header h1 {
            font-size: 32px;
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .header p {
            color: var(--text-muted);
            font-size: 14px;
            margin-top: 5px;
        }

        /* Инпуты */
        .input-group {
            margin-bottom: 20px;
            transform: translateZ(30px);
        }

        .input-group label {
            display: block;
            font-size: 12px;
            color: var(--accent-cyan);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            padding: 15px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 10px;
            color: white;
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
        }

        input:focus {
            border-color: var(--accent-purple);
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5), 0 0 15px rgba(188, 19, 254, 0.3);
        }

        /* 3D Кнопка */
        .btn-3d {
            width: 100%;
            padding: 18px;
            margin-top: 10px;
            font-size: 16px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #fff;
            background: linear-gradient(to bottom, #10b981, #059669);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 6px 0 #047857, 0 15px 20px rgba(0, 0, 0, 0.4);
            transform: translateZ(50px);
            transition: all 0.1s;
        }

        .btn-3d:hover {
            background: linear-gradient(to bottom, #34d399, #10b981);
            transform: translateZ(50px) translateY(2px);
            box-shadow: 0 4px 0 #047857, 0 10px 15px rgba(0, 0, 0, 0.4);
        }

        .btn-3d:active {
            transform: translateZ(50px) translateY(6px);
            box-shadow: 0 0 0 #047857, 0 5px 5px rgba(0, 0, 0, 0.4);
        }

        /* Результат */
        .result-box {
            margin-top: 30px;
            padding: 20px;
            background: rgba(0, 243, 255, 0.1);
            border: 1px solid var(--accent-cyan);
            border-radius: 10px;
            text-align: center;
            transform: translateZ(40px);
            display: none;
            animation: fadeIn 0.3s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateZ(40px) translateY(-10px); }
            to { opacity: 1; transform: translateZ(40px) translateY(0); }
        }

        .result-link {
            display: block;
            font-size: 18px;
            color: var(--accent-cyan);
            font-weight: bold;
            text-decoration: none;
            margin-bottom: 15px;
            word-break: break-all;
        }

        .btn-copy {
            background: var(--accent-purple);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-copy:hover {
            filter: brightness(1.2);
            box-shadow: 0 0 10px var(--accent-purple);
        }

        .error-msg {
            color: #ef4444;
            font-size: 14px;
            margin-top: 15px;
            display: none;
            transform: translateZ(30px);
        }
    </style>
</head>
<body>

<div class="scene">
    <div class="panel" id="mainPanel">
        <div class="header">
            <h1>NEXUS LINK</h1>
            <p>System Online // Generate Short URL</p>
        </div>

        <div class="input-group sound-hover">
            <label>Исходная ссылка (URL)</label>
            <input type="url" id="longUrl" placeholder="https://example.com/very/long/path" required>
        </div>

        <div class="input-group sound-hover">
            <label>Свое имя ссылки (Необязательно)</label>
            <input type="text" id="customAlias" placeholder="my-custom-name">
            <span style="font-size: 10px; color: #666; display: block; margin-top: 5px;">Разрешены только буквы, цифры и дефисы</span>
        </div>

        <button class="btn-3d sound-btn" onclick="shortenUrl()">СОКРАТИТЬ</button>

        <div class="error-msg" id="errorMsg"></div>

        <div class="result-box" id="resultBox">
            <label style="font-size: 12px; color: var(--accent-cyan); text-transform: uppercase; margin-bottom: 10px; display: block;">Ваша ссылка готова:</label>
            <a href="#" target="_blank" class="result-link sound-hover" id="shortenedUrlText"></a>
            <button class="btn-copy sound-btn" onclick="copyLink()">КОПИРОВАТЬ</button>
        </div>
    </div>
</div>

<script>
    // --- АУДИО СИСТЕМА ---
    let audioCtx = null;

    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playSound(freq, type, dur, vol) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        
        gain.gain.setValueAtTime(0.001, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(vol, audioCtx.currentTime + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
        
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.start();
        osc.stop(audioCtx.currentTime + dur);
    }

    document.addEventListener('click', initAudio, { once: true });

    // Звуки интерфейса
    document.querySelectorAll('.sound-btn').forEach(btn => {
        btn.addEventListener('mouseenter', () => {
            initAudio();
            playSound(900, 'sine', 0.05, 0.05);
        });
        btn.addEventListener('mousedown', () => {
            playSound(300, 'square', 0.1, 0.1);
        });
    });

    document.querySelectorAll('.sound-hover').forEach(el => {
        el.addEventListener('mouseenter', () => {
            initAudio();
            playSound(1200, 'sine', 0.03, 0.02);
        });
    });

    // --- 3D ПАРАЛЛАКС ЭФФЕКТ ---
    const panel = document.getElementById('mainPanel');
    const scene = document.querySelector('.scene');

    scene.addEventListener('mousemove', (e) => {
        const rect = scene.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        const xc = rect.width / 2;
        const yc = rect.height / 2;
        const dx = x - xc;
        const dy = y - yc;
        
        // Ограничиваем угол наклона
        const rotateY = (dx / xc) * 10; 
        const rotateX = -(dy / yc) * 10;
        
        panel.style.transform = `rotateY(${rotateY}deg) rotateX(${rotateX}deg)`;
    });

    scene.addEventListener('mouseleave', () => {
        panel.style.transform = `rotateY(0deg) rotateX(0deg)`;
    });

    // --- ЛОГИКА СОКРАЩЕНИЯ ССЫЛОК ---
    async function shortenUrl() {
        const longUrl = document.getElementById('longUrl').value.trim();
        const customAlias = document.getElementById('customAlias').value.trim();
        const errorMsg = document.getElementById('errorMsg');
        const resultBox = document.getElementById('resultBox');
        
        errorMsg.style.display = 'none';
        resultBox.style.display = 'none';

        if (!longUrl) {
            showError("Пожалуйста, введите исходную ссылку.");
            return;
        }

        // Формируем запрос к API is.gd
        let apiUrl = `https://is.gd/create.php?format=json&url=${encodeURIComponent(longUrl)}`;
        if (customAlias) {
            apiUrl += `&shorturl=${encodeURIComponent(customAlias)}`;
        }

        try {
            // Звук обработки
            playSound(600, 'sawtooth', 0.2, 0.05);
            
            const response = await fetch(apiUrl);
            const data = await response.json();

            if (data.shorturl) {
                // Успех
                playSound(1500, 'sine', 0.3, 0.1); // Звук успеха
                const finalLink = data.shorturl;
                const linkEl = document.getElementById('shortenedUrlText');
                linkEl.textContent = finalLink;
                linkEl.href = finalLink;
                resultBox.style.display = 'block';
            } else {
                // Ошибка от API (например, имя уже занято)
                showError(data.errormessage || "Ошибка при сокращении ссылки.");
            }
        } catch (error) {
            showError("Ошибка соединения. Проверьте интернет или отключите блокировщик рекламы.");
        }
    }

    function showError(text) {
        playSound(200, 'sawtooth', 0.3, 0.1); // Звук ошибки
        const errorMsg = document.getElementById('errorMsg');
        errorMsg.textContent = "⚠ " + text;
        errorMsg.style.display = 'block';
    }

    function copyLink() {
        const textToCopy = document.getElementById('shortenedUrlText').textContent;
        navigator.clipboard.writeText(textToCopy).then(() => {
            const btn = document.querySelector('.btn-copy');
            const originalText = btn.textContent;
            btn.textContent = "СКОПИРОВАНО!";
            btn.style.background = "#10b981"; // Зеленый цвет при успехе
            playSound(2000, 'sine', 0.1, 0.05);
            
            setTimeout(() => {
                btn.textContent = originalText;
                btn.style.background = "var(--accent-purple)";
            }, 2000);
        });
    }
</script>

</body>
</html>
