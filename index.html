<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="google-site-verification" content="08786ed5dd075446" />
    <meta name="yandex-verification" content="b0cdcd362335b6e1" />
    
    <title>NEXUS LINK | Бесплатное сокращение ссылок</title>
    <meta name="description" content="NEXUS LINK — быстрый сервис сокращения ссылок с кастомными псевдонимами. Создавайте короткие URL мгновенно.">
    
    <style>
        :root {
            --bg-color: #08080c;
            --panel-bg: rgba(15, 15, 25, 0.9);
            --accent-cyan: #00f3ff;
            --accent-purple: #bc13fe;
            --text-main: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-image: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #08080c 100%);
        }

        .scene { perspective: 1000px; width: 90%; max-width: 420px; }

        .panel {
            background: var(--panel-bg);
            border: 2px solid rgba(0, 243, 255, 0.3);
            border-radius: 20px;
            padding: 35px;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            transform-style: preserve-3d;
            transition: transform 0.1s;
            position: relative;
        }

        /* --- СТИЛИ ДЛЯ СЧЕТЧИКОВ --- */
        .visitor-stats {
            position: absolute; top: 20px; right: 20px; display: flex; align-items: center; gap: 6px;
            color: var(--accent-cyan); font-size: 11px; font-weight: bold; opacity: 0.8; transition: 0.3s;
            background: rgba(0, 243, 255, 0.1); padding: 5px 10px; border-radius: 20px;
            border: 1px solid rgba(0, 243, 255, 0.2); text-shadow: 0 0 5px rgba(0, 243, 255, 0.5);
        }
        .visitor-stats:hover { opacity: 1; box-shadow: 0 0 10px rgba(0, 243, 255, 0.3); }
        .visitor-stats svg { width: 14px; height: 14px; stroke: var(--accent-cyan); }

        .shortened-stats {
            position: absolute; top: 20px; left: 20px; display: flex; align-items: center; gap: 6px;
            color: var(--accent-purple); font-size: 11px; font-weight: bold; opacity: 0.8; transition: 0.3s;
            background: rgba(188, 19, 254, 0.1); padding: 5px 10px; border-radius: 20px;
            border: 1px solid rgba(188, 19, 254, 0.2); text-shadow: 0 0 5px rgba(188, 19, 254, 0.5);
        }
        .shortened-stats:hover { opacity: 1; box-shadow: 0 0 10px rgba(188, 19, 254, 0.3); }
        .shortened-stats svg { width: 14px; height: 14px; stroke: var(--accent-purple); }

        h1 {
            font-size: 26px; text-align: center;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-transform: uppercase; margin-bottom: 25px; margin-top: 10px;
        }

        .input-box { margin-bottom: 20px; }
        label { display: block; font-size: 10px; color: var(--accent-cyan); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        input { width: 100%; padding: 12px; background: rgba(0, 0, 0, 0.7); border: 1px solid #333; border-radius: 8px; color: #fff; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--accent-cyan); box-shadow: 0 0 10px rgba(0, 243, 255, 0.2); }

        .btn {
            width: 100%; padding: 16px; background: linear-gradient(135deg, var(--accent-cyan), #0081cc);
            border: none; border-radius: 10px; color: #000; font-weight: 900; cursor: pointer;
            text-transform: uppercase; box-shadow: 0 5px 0 #005a8f; transition: 0.1s;
        }
        .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #005a8f; }

        /* --- СТИЛИ ДЛЯ ЛИЧНОГО КАБИНЕТА --- */
        .cabinet-btn {
            width: 100%; padding: 10px; background: transparent; border: 1px solid var(--accent-purple);
            border-radius: 10px; color: var(--accent-purple); font-weight: bold; cursor: pointer;
            margin-top: 15px; transition: 0.3s; text-transform: uppercase; font-size: 12px;
        }
        .cabinet-btn:hover { background: rgba(188, 19, 254, 0.1); box-shadow: 0 0 10px rgba(188, 19, 254, 0.2); }
        
        .dashboard {
            display: none; margin-top: 15px; max-height: 180px; overflow-y: auto; text-align: left;
            border-top: 1px dashed #333; padding-top: 15px;
        }
        /* Стилизация скроллбара */
        .dashboard::-webkit-scrollbar { width: 4px; }
        .dashboard::-webkit-scrollbar-thumb { background: var(--accent-purple); border-radius: 4px; }
        
        .history-item {
            background: rgba(0, 0, 0, 0.6); padding: 10px; border-radius: 8px; margin-bottom: 10px;
            border: 1px solid rgba(188, 19, 254, 0.3); position: relative; font-size: 11px;
        }
        .history-item .orig-url { color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-right: 25px; margin-bottom: 4px; }
        .history-item .short-url { color: var(--accent-cyan); font-weight: bold; text-decoration: none; font-size: 13px; }
        .history-item .stats-link { color: var(--accent-purple); text-decoration: none; margin-left: 10px; border-bottom: 1px dashed var(--accent-purple); }
        .history-item .delete-btn {
            position: absolute; right: 8px; top: 8px; background: rgba(255, 77, 77, 0.2); color: #ff4d4d;
            border: 1px solid #ff4d4d; border-radius: 4px; cursor: pointer; padding: 2px 5px; font-size: 9px; transition: 0.2s;
        }
        .history-item .delete-btn:hover { background: #ff4d4d; color: #fff; }

        #loader { display: none; margin: 15px auto; width: 30px; height: 30px; border: 3px solid #333; border-top-color: var(--accent-cyan); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .result-area { display: none; margin-top: 25px; padding: 15px; background: rgba(0, 243, 255, 0.1); border: 1px dashed var(--accent-cyan); border-radius: 10px; text-align: center; }
        .error { color: #ff4d4d; font-size: 13px; margin-top: 15px; text-align: center; display: none; }
    </style>
</head>
<body>

<div class="scene">
    <div class="panel" id="panel">
        
        <div class="shortened-stats" title="Всего сокращено ссылок">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
                <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
            </svg>
            <span id="shortenedCount">...</span>
        </div>

        <div class="visitor-stats" title="Посещений за 30 дней">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
            </svg>
            <span id="visitCount">...</span>
        </div>

        <h1>NEXUS LINK</h1>

        <div class="input-box">
            <label>Ссылка для сокращения</label>
            <input type="url" id="longUrl" placeholder="https://..." required>
        </div>

        <div class="input-box">
            <label>Ваш Alias (необязательно)</label>
            <input type="text" id="alias" placeholder="Например: mylink">
        </div>

        <button class="btn sound-btn" onclick="shorten()">СОКРАТИТЬ</button>
        
        <button class="cabinet-btn sound-btn" onclick="toggleDashboard()">Мой кабинет (0 ссылок)</button>
        
        <div class="dashboard" id="dashboard"></div>
        
        <div id="loader"></div>
        <div class="error" id="error"></div>

        <div class="result-area" id="resultArea">
            <div style="font-size: 11px; margin-bottom: 8px; color: var(--accent-cyan);">ГОТОВО:</div>
            <a href="#" id="finalLink" target="_blank" style="color: #fff; font-weight: bold; font-size: 18px; text-decoration: none;"></a>
            <br><br>
            <button class="sound-btn" onclick="copy()" style="background: var(--accent-purple); color: white; border: none; padding: 7px 15px; border-radius: 5px; cursor: pointer;">Копировать</button>
        </div>
    </div>
</div>

<script>
    // --- ЛОГИКА СЧЕТЧИКОВ ---
    async function updateVisitorCount() {
        const countElement = document.getElementById('visitCount');
        try {
            const response = await fetch('https://api.counterapi.dev/v1/nexus_link_main/visits/up');
            const data = await response.json();
            countElement.textContent = data.count;
        } catch (error) {
            countElement.textContent = "100+";
        }
    }

    async function updateShortenedCount(increment = false) {
        const countElement = document.getElementById('shortenedCount');
        try {
            const endpoint = increment ? '/up' : '';
            const response = await fetch(`https://api.counterapi.dev/v1/nexus_link_main/total_links${endpoint}`);
            const data = await response.json();
            if (data.count !== undefined) countElement.textContent = data.count;
        } catch (error) {
            if (!increment && countElement.textContent === "...") countElement.textContent = "0";
        }
    }

    updateVisitorCount();
    updateShortenedCount();

    // --- ЛОГИКА ЛИЧНОГО КАБИНЕТА (LOCAL STORAGE) ---
    function loadHistory() {
        return JSON.parse(localStorage.getItem('nexus_user_links')) || [];
    }

    function saveToHistory(originalUrl, shortUrl) {
        let history = loadHistory();
        // Добавляем в начало массива
        history.unshift({ original: originalUrl, short: shortUrl, date: new Date().toLocaleDateString() });
        localStorage.setItem('nexus_user_links', JSON.stringify(history));
        renderDashboard();
    }

    function deleteHistoryItem(index) {
        let history = loadHistory();
        history.splice(index, 1);
        localStorage.setItem('nexus_user_links', JSON.stringify(history));
        renderDashboard();
    }

    function toggleDashboard() {
        const dash = document.getElementById('dashboard');
        dash.style.display = (dash.style.display === 'block') ? 'none' : 'block';
    }

    function renderDashboard() {
        const dash = document.getElementById('dashboard');
        const btn = document.querySelector('.cabinet-btn');
        let history = loadHistory();
        
        btn.textContent = `Мой кабинет (${history.length} ссылок)`;

        if (history.length === 0) {
            dash.innerHTML = "<div style='text-align:center; opacity:0.5; margin-top: 10px;'>У вас пока нет сохраненных ссылок.</div>";
            return;
        }

        dash.innerHTML = history.map((item, index) => `
            <div class="history-item">
                <button class="delete-btn" onclick="deleteHistoryItem(${index})" title="Удалить из истории">X</button>
                <div class="orig-url" title="${item.original}">${item.original}</div>
                <div>
                    <a href="${item.short}" target="_blank" class="short-url">${item.short}</a>
                    <a href="${item.short}-" target="_blank" class="stats-link" title="Посмотреть переходы">Статистика</a>
                </div>
            </div>
        `).join('');
    }
    
    // Инициализация кабинета при заходе на сайт (Авторизация браузера)
    renderDashboard();

    // --- УЛУЧШЕННАЯ АУДИО СИСТЕМА И 3D ---
    let audioCtx=null;function initAudio(){if(!audioCtx){audioCtx=new(window.AudioContext||window.webkitAudioContext)()}if(audioCtx.state==='suspended'){audioCtx.resume()}}function playSound(freq,type,dur,vol){if(!audioCtx)return;const osc=audioCtx.createOscillator();const gain=audioCtx.createGain();osc.type=type;osc.frequency.setValueAtTime(freq,audioCtx.currentTime);gain.gain.setValueAtTime(0.001,audioCtx.currentTime);gain.gain.exponentialRampToValueAtTime(vol,audioCtx.currentTime+0.02);gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);osc.connect(gain);gain.connect(audioCtx.destination);osc.start();osc.stop(audioCtx.currentTime+dur)}document.addEventListener('click',initAudio,{once:true});document.querySelectorAll('.btn, .sound-btn, .cabinet-btn').forEach(btn=>{btn.addEventListener('mouseenter',()=>{initAudio();playSound(800,'sine',0.1,0.1)});btn.addEventListener('mousedown',()=>{playSound(150,'square',0.15,0.2)})});document.querySelectorAll('.panel').forEach(card=>{card.addEventListener('mouseenter',()=>{initAudio();playSound(1200,'sine',0.05,0.03);setTimeout(()=>playSound(1600,'sine',0.04,0.02),50)});card.addEventListener('mousemove',(e)=>{const rect=card.getBoundingClientRect();const x=e.clientX-rect.left;const y=e.clientY-rect.top;const dx=x-rect.width/2;const dy=y-rect.height/2;card.style.transform=`rotateY(${dx/15}deg) rotateX(${-dy/15}deg) translateZ(20px)`});card.addEventListener('mouseleave',()=>{card.style.transform='rotateY(0deg) rotateX(0deg) translateZ(0px)'})});(function(){let link=document.querySelector("link[rel*='icon']");if(!link){link=document.createElement('link');link.rel='icon';document.head.appendChild(link)}link.href='favicon.ico';link.type='image/x-icon'})();

    // --- ЛОГИКА СОКРАЩЕНИЯ ССЫЛОК ---
    async function shorten() {
        const url = document.getElementById('longUrl').value;
        const alias = document.getElementById('alias').value.trim();
        const resDiv = document.getElementById('resultArea');
        const errDiv = document.getElementById('error');
        const loader = document.getElementById('loader');

        if (!url) return;
        resDiv.style.display = 'none';
        errDiv.style.display = 'none';
        loader.style.display = 'block';

        // Добавлен параметр &logstats=1 для включения сбора статистики у is.gd
        let target = `https://is.gd/create.php?format=json&url=${encodeURIComponent(url)}&logstats=1`;
        if (alias) target += `&shorturl=${encodeURIComponent(alias)}`;
        const finalUrl = `https://corsproxy.io/?${encodeURIComponent(target)}`;

        try {
            const response = await fetch(finalUrl);
            const data = await response.json();
            if (data.shorturl) {
                document.getElementById('finalLink').textContent = data.shorturl;
                document.getElementById('finalLink').href = data.shorturl;
                resDiv.style.display = 'block';
                
                updateShortenedCount(true);
                
                // Сохраняем в личный кабинет
                saveToHistory(url, data.shorturl);
                
                // Очищаем поля
                document.getElementById('longUrl').value = '';
                document.getElementById('alias').value = '';
            } else {
                throw new Error(data.errormessage || "Ошибка");
            }
        } catch (e) {
            errDiv.textContent = "Ошибка: " + e.message;
            errDiv.style.display = 'block';
        } finally {
            loader.style.display = 'none';
        }
    }

    function copy() {
        const t = document.getElementById('finalLink').textContent;
        navigator.clipboard.writeText(t);
        alert("Скопировано!");
    }
</script>
</body>
</html>
